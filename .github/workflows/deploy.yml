name: Deploy to GitHub Pages

on:
  # main ブランチへの push で自動デプロイ
  push:
    branches: [main]
  # Actions タブから手動実行も可能（Notionの内容を「今すぐ反映」）
  workflow_dispatch:
  # Notionの更新を定期的に取り込む（UTC。日本時間の朝9時・夜21時）
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1つに制限（古いデプロイはキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
